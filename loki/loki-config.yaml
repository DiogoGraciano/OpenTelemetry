auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Obrigatório para ingestão OTLP em Loki 3.x
  allow_structured_metadata: true
  # Promove atributos de recurso OTLP a labels indexados (resto vira structured metadata)
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - service.name
            - service.namespace
            - service.instance.id
            - deployment.environment
            - deployment.environment.name

ruler:
  alertmanager_url: http://localhost:9093
