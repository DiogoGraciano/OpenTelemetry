global:
  scrape_interval: 60s
  evaluation_interval: 60s

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - deployment.environment.name
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name

scrape_configs:
  # Métricas da própria VPS (CPU, RAM, disco, rede)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Auto-scrape do Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
