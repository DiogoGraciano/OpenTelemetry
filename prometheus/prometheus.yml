global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métricas da própria VPS (CPU, RAM, disco, rede)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Auto-scrape do Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
